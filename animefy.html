<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anime-Fy Me 1.8 - Artistic Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600&display=swap');

        :root {
            --anime-pink: #ff85a1;
            --anime-purple: #7b2cbf;
            --anime-bg: #f8f9fa;
            --slider-track: #e5e7eb;
            --samsung-blue: #037ffc;
        }

        body {
            font-family: 'Fredoka', sans-serif;
            background-color: var(--anime-bg);
            background-image: radial-gradient(#ff85a122 1px, transparent 1px);
            background-size: 20px 20px;
            padding-bottom: 40px;
            overscroll-behavior-y: contain;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border: 2px solid white;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.05);
        }

        .anime-border {
            border: 3px solid #1a1a1a;
            box-shadow: 6px 6px 0px #1a1a1a;
            transition: all 0.2s ease;
        }

        .anime-border:active {
            transform: translate(2px, 2px);
            box-shadow: 2px 2px 0px #1a1a1a;
        }

        /* --- SAMSUNG STYLE DROPDOWN --- */
        .samsung-dropdown {
            background: white;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.15);
            overflow: hidden;
            border: 1px solid #eee;
            width: 240px;
        }

        .dropdown-item {
            padding: 12px 16px;
            font-size: 14px;
            color: #1a1a1a;
            cursor: pointer;
            transition: background 0.2s;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .dropdown-item:hover {
            background: #f5f5f5;
        }

        .dropdown-item.active {
            background: var(--samsung-blue);
            color: white;
        }

        /* --- PREMIUM SLIDER UI --- */
        .custom-slider {
            -webkit-appearance: none;
            appearance: none;
            width: 100%;
            height: 14px;
            border-radius: 14px;
            background: linear-gradient(to right, var(--anime-pink) 0%, var(--anime-pink) var(--val, 70%), var(--slider-track) var(--val, 70%), var(--slider-track) 100%);
            outline: none;
            cursor: pointer;
            margin: 15px 0;
            touch-action: pan-x;
        }

        .custom-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            height: 30px;
            width: 30px;
            border-radius: 50%;
            background: white;
            border: 5px solid var(--anime-pink);
            box-shadow: 0 6px 16px rgba(255, 133, 161, 0.4);
            cursor: pointer;
            margin-top: -8px; 
        }

        .custom-slider::-moz-range-thumb {
            height: 30px; width: 30px;
            border-radius: 50%; background: white;
            border: 5px solid var(--anime-pink);
        }

        #filterPanel {
            position: fixed;
            bottom: -100%;
            left: 0;
            width: 100%;
            background: white;
            border-top: 4px solid #1a1a1a;
            transition: bottom 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 100;
            padding: 24px;
            padding-bottom: env(safe-area-inset-bottom, 24px);
        }

        #filterPanel.active { bottom: 0; }

        .filter-item {
            min-width: 90px;
            cursor: pointer;
            text-align: center;
        }

        .filter-item canvas {
            width: 70px;
            height: 70px;
            border-radius: 12px;
            border: 2px solid #eee;
            margin-bottom: 6px;
        }

        .filter-item.active canvas {
            border-color: var(--anime-pink);
            box-shadow: 0 0 0 3px var(--anime-pink);
            transform: scale(1.05);
        }

        #main-canvas {
            max-height: 55vh;
            width: 100%;
            object-fit: contain;
        }

        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }

        /* Floating Redo Button */
        #redo-floating-btn {
            position: absolute;
            top: 1rem;
            right: 1rem;
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(4px);
            border: 2px solid #1a1a1a;
            border-radius: 12px;
            padding: 8px;
            cursor: pointer;
            z-index: 10;
            transition: all 0.2s;
        }
        #redo-floating-btn:hover {
            background: white;
            transform: scale(1.1);
        }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="max-w-2xl mx-auto space-y-6">
        <!-- Header -->
        <div class="flex items-center justify-between">
            <div>
                <h1 class="text-3xl font-bold text-gray-900 tracking-tight">Anime-Fy <span class="text-[#ff85a1]">Me</span></h1>
                <p class="text-sm text-gray-500 font-medium">V1.8 • Art Expansion</p>
            </div>
            
            <!-- Samsung Style Dropdown Trigger -->
            <div class="relative">
                <button id="ai-mode-btn" class="px-4 py-2 bg-white anime-border rounded-xl font-bold text-sm flex items-center gap-2">
                    <span id="current-mode-label">Adaptive Context</span>
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>
                </button>
                
                <div id="ai-dropdown" class="hidden absolute right-0 mt-2 samsung-dropdown z-50">
                    <div class="dropdown-item active" data-mode="adaptive">Adaptive Context Mode</div>
                    <div class="dropdown-item" data-mode="ghibli">Force Ghibli (Portrait Bias)</div>
                    <div class="dropdown-item" data-mode="shonen">Force Shonen (High Saturation)</div>
                    <div class="dropdown-item" data-mode="retro">Force Retro (Noise & Texture)</div>
                </div>
            </div>
        </div>

        <!-- Main Workspace -->
        <div class="glass-card anime-border rounded-3xl p-6 relative overflow-hidden">
            <!-- Floating Redo Option (Hidden initially) -->
            <button id="redo-floating-btn" class="hidden" title="Re-generate with current AI mode">
                <svg class="w-5 h-5 text-gray-700" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path></svg>
            </button>

            <div id="drop-zone" class="border-4 border-dashed border-gray-100 rounded-2xl min-h-[320px] flex flex-col items-center justify-center transition-all cursor-pointer hover:border-[#ff85a1] hover:bg-pink-50">
                <div id="upload-ui" class="text-center">
                    <div class="w-20 h-20 bg-pink-100 rounded-full flex items-center justify-center mx-auto mb-4">
                        <svg class="w-10 h-10 text-[#ff85a1]" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
                    </div>
                    <p class="font-bold text-gray-700">Drop your photo here</p>
                    <p class="text-xs text-gray-400 mt-1 uppercase tracking-widest font-bold">Limit 10MB</p>
                </div>
                
                <div id="loading-ui" class="hidden text-center space-y-4">
                    <div class="w-16 h-16 border-4 border-[#ff85a1] border-t-transparent rounded-full animate-spin mx-auto"></div>
                    <p class="text-sm font-bold text-gray-600 italic animate-pulse" id="status-label">Synthesizing Layers...</p>
                </div>

                <canvas id="main-canvas" class="hidden rounded-xl"></canvas>
            </div>

            <div id="action-bar" class="hidden mt-6 flex gap-3">
                <button id="post-btn" class="flex-1 bg-white anime-border py-4 rounded-2xl font-bold flex items-center justify-center gap-2 hover:bg-gray-50">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6V4m0 2a2 2 0 100 4m0-4a2 2 0 110 4m-6 8a2 2 0 100-4m0 4a2 2 0 110-4m0 4v2m0-6V4m6 6v10m6-2a2 2 0 100-4m0 4a2 2 0 110-4m0 4v2m0-6V4"></path></svg>
                    Edit Style
                </button>
                <button id="export-btn" class="flex-1 bg-[#1a1a1a] text-white anime-border py-4 rounded-2xl font-bold flex items-center justify-center gap-2">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path></svg>
                    Save JPG
                </button>
            </div>
        </div>

        <!-- Settings -->
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
            <div class="glass-card anime-border rounded-2xl p-5">
                <div class="flex justify-between items-center mb-1">
                    <label class="font-bold text-gray-700">Anime Fidelity</label>
                    <span id="val-target-q" class="text-[10px] bg-pink-100 text-[#ff85a1] px-2 py-0.5 rounded-full font-bold">85%</span>
                </div>
                <input type="range" id="target-q" class="custom-slider" min="10" max="100" value="85">
            </div>
            <div class="glass-card anime-border rounded-2xl p-5">
                <div class="flex justify-between items-center mb-1">
                    <label class="font-bold text-gray-700">Detail Density</label>
                    <span id="val-max-l" class="text-[10px] bg-purple-100 text-purple-600 px-2 py-0.5 rounded-full font-bold">1200</span>
                </div>
                <input type="range" id="max-l" class="custom-slider" min="512" max="2048" value="1200">
            </div>
        </div>

        <input type="file" id="file-input" class="hidden" accept="image/*">
    </div>

    <!-- Post-Op Drawer -->
    <div id="filterPanel">
        <div class="flex justify-between items-center mb-6">
            <h3 class="text-xl font-bold">Post-Processing Style</h3>
            <button id="close-panel" class="p-2 hover:bg-gray-100 rounded-full">
                <svg class="w-6 h-6 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
            </button>
        </div>
        
        <div class="mb-6">
            <div class="flex justify-between mb-2">
                <span class="text-xs font-bold text-gray-400 uppercase tracking-widest">Effect Strength</span>
                <span class="text-sm font-bold text-[#ff85a1]" id="val-intensity">70%</span>
            </div>
            <input type="range" id="intensity" class="custom-slider" min="0" max="100" value="70">
        </div>

        <div id="filterItems" class="flex gap-4 overflow-x-auto pb-4 scrollbar-hide"></div>
    </div>

    <div id="toast" class="fixed bottom-8 left-1/2 -translate-x-1/2 bg-[#1a1a1a] text-white px-6 py-3 rounded-full font-bold shadow-2xl opacity-0 transition-all z-[200]">
        Message
    </div>

    <script type="module">
        const apiKey = ""; 
        let originalOutput = null; 
        let lastUploadedBase64 = null;
        let currentFilter = 'Vibrant';
        let aiMode = 'adaptive';

        // 1. ADVANCED ENGINE: 10+ Artistic Styles
        const FilterEngine = {
            "Original": (ctx, img, val) => {
                ctx.drawImage(img, 0, 0);
            },
            "Color Pencil": (ctx, img, val) => {
                ctx.filter = `contrast(130%) saturate(80%) brightness(105%)`;
                ctx.drawImage(img, 0, 0);
                ctx.globalCompositeOperation = 'multiply';
                ctx.fillStyle = `rgba(200, 200, 200, ${val/300})`;
                ctx.fillRect(0,0,ctx.canvas.width, ctx.canvas.height);
                ctx.globalCompositeOperation = 'source-over';
                ctx.filter = 'none';
            },
            "Comic (BD)": (ctx, img, val) => {
                ctx.filter = `contrast(${150 + val}%) saturate(${120 + val}%)`;
                ctx.drawImage(img, 0, 0);
                ctx.filter = 'none';
            },
            "Watercolor": (ctx, img, val) => {
                ctx.filter = `blur(${val/50}px) saturate(${110 + val/2}%) contrast(90%)`;
                ctx.drawImage(img, 0, 0);
                ctx.globalCompositeOperation = 'soft-light';
                ctx.fillStyle = `rgba(255, 255, 255, ${val/200})`;
                ctx.fillRect(0,0,ctx.canvas.width, ctx.canvas.height);
                ctx.globalCompositeOperation = 'source-over';
                ctx.filter = 'none';
            },
            "Oil Painting": (ctx, img, val) => {
                ctx.filter = `contrast(120%) saturate(140%) blur(${val/100}px)`;
                ctx.drawImage(img, 0, 0);
                ctx.filter = 'none';
            },
            "Blue Ink": (ctx, img, val) => {
                ctx.filter = 'grayscale(100%) brightness(110%) contrast(150%)';
                ctx.drawImage(img, 0, 0);
                ctx.globalCompositeOperation = 'multiply';
                ctx.fillStyle = `rgba(0, 50, 150, ${val/100})`;
                ctx.fillRect(0,0,ctx.canvas.width, ctx.canvas.height);
                ctx.globalCompositeOperation = 'source-over';
                ctx.filter = 'none';
            },
            "Pastel": (ctx, img, val) => {
                ctx.filter = `brightness(115%) saturate(${60 + val/2}%) blur(${val/120}px)`;
                ctx.drawImage(img, 0, 0);
                ctx.filter = 'none';
            },
            "Marker Pen": (ctx, img, val) => {
                ctx.filter = `saturate(${150 + val}%) contrast(130%)`;
                ctx.drawImage(img, 0, 0);
                ctx.filter = 'none';
            },
            "Line Drawing": (ctx, img, val) => {
                ctx.filter = `grayscale(100%) contrast(500%) invert(100%) opacity(${val}%)`;
                ctx.drawImage(img, 0, 0);
                ctx.filter = 'none';
            },
            "Cubist": (ctx, img, val) => {
                ctx.filter = `hue-rotate(${val}deg) saturate(150%) contrast(150%)`;
                ctx.drawImage(img, 0, 0);
                ctx.filter = 'none';
            },
            "Pencil/Wash": (ctx, img, val) => {
                ctx.filter = `grayscale(80%) contrast(120%) brightness(110%)`;
                ctx.drawImage(img, 0, 0);
                ctx.filter = 'none';
            },
            "Vibrant": (ctx, img, val) => {
                ctx.filter = `saturate(${100 + val}%) contrast(${100 + val/4}%)`;
                ctx.drawImage(img, 0, 0);
                ctx.filter = 'none';
            }
        };

        // 2. UI & LOGIC LAYER
        const UI = {
            els: {
                dropZone: document.getElementById('drop-zone'),
                uploadUI: document.getElementById('upload-ui'),
                loadingUI: document.getElementById('loading-ui'),
                canvas: document.getElementById('main-canvas'),
                fileInput: document.getElementById('file-input'),
                postBtn: document.getElementById('post-btn'),
                exportBtn: document.getElementById('export-btn'),
                redoBtn: document.getElementById('redo-floating-btn'),
                actionBar: document.getElementById('action-bar'),
                toast: document.getElementById('toast'),
                filterPanel: document.getElementById('filterPanel'),
                filterItems: document.getElementById('filterItems'),
                closePanel: document.getElementById('close-panel'),
                aiModeBtn: document.getElementById('ai-mode-btn'),
                aiDropdown: document.getElementById('ai-dropdown'),
                modeLabel: document.getElementById('current-mode-label')
            },

            init() {
                this.setupSliders();
                this.setupEvents();
            },

            setupSliders() {
                const sliders = document.querySelectorAll('.custom-slider');
                sliders.forEach(slider => {
                    this.updateSliderState(slider);
                    slider.addEventListener('input', (e) => {
                        this.updateSliderState(e.target);
                        if (e.target.id === 'intensity') this.refreshCanvas();
                    });
                });
            },

            updateSliderState(el) {
                const percent = (el.value - el.min) / (el.max - el.min) * 100;
                el.style.setProperty('--val', `${percent}%`);
                const label = document.getElementById(`val-${el.id}`);
                if (label) label.textContent = el.id === 'max-l' ? el.value : `${el.value}%`;
            },

            setupEvents() {
                this.els.dropZone.onclick = () => this.els.fileInput.click();
                this.els.postBtn.onclick = () => this.els.filterPanel.classList.add('active');
                this.els.closePanel.onclick = () => this.els.filterPanel.classList.remove('active');
                this.els.fileInput.onchange = (e) => this.handleUpload(e);
                this.els.exportBtn.onclick = () => this.downloadArt();
                this.els.redoBtn.onclick = (e) => {
                    e.stopPropagation();
                    if (lastUploadedBase64) this.runAIPipeline(lastUploadedBase64);
                };

                // Samsung Dropdown Logic
                this.els.aiModeBtn.onclick = (e) => {
                    e.stopPropagation();
                    this.els.aiDropdown.classList.toggle('hidden');
                };

                document.querySelectorAll('.dropdown-item').forEach(item => {
                    item.onclick = () => {
                        document.querySelectorAll('.dropdown-item').forEach(i => i.classList.remove('active'));
                        item.classList.add('active');
                        aiMode = item.dataset.mode;
                        this.els.modeLabel.textContent = item.textContent.split('(')[0].trim();
                        this.els.aiDropdown.classList.add('hidden');
                    };
                });

                window.onclick = () => this.els.aiDropdown.classList.add('hidden');
            },

            async handleUpload(e) {
                const file = e.target.files[0];
                if (!file) return;
                this.toggleLoading(true);
                const reader = new FileReader();
                reader.onload = async (re) => {
                    lastUploadedBase64 = re.target.result.split(',')[1];
                    await this.runAIPipeline(lastUploadedBase64);
                };
                reader.readAsDataURL(file);
            },

            toggleLoading(isLoading) {
                this.els.uploadUI.classList.toggle('hidden', isLoading);
                this.els.loadingUI.classList.toggle('hidden', !isLoading);
                this.els.canvas.classList.toggle('hidden', isLoading);
                this.els.actionBar.classList.toggle('hidden', isLoading);
                this.els.redoBtn.classList.add('hidden'); // Hide redo during loading
            },

            async runAIPipeline(base64) {
                this.toggleLoading(true); // Ensure loading is on for re-runs
                
                const prompts = {
                    adaptive: "Detailed anime style illustration, vibrant cel shading.",
                    ghibli: "Studio Ghibli style, soft painted background, detailed facial features, nostalgic aesthetic.",
                    shonen: "High saturation shonen anime style, dynamic lighting, bold colors, action focus.",
                    retro: "90s retro anime aesthetic, CRT scanline texture, film grain, muted vintage colors."
                };

                const payload = {
                    contents: [{
                        parts: [
                            { text: prompts[aiMode] },
                            { inlineData: { mimeType: "image/png", data: base64 } }
                        ]
                    }],
                    generationConfig: { responseModalities: ['TEXT', 'IMAGE'] }
                };

                try {
                    const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-image-preview:generateContent?key=${apiKey}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload)
                    });
                    const result = await res.json();
                    const outputBase64 = result.candidates?.[0]?.content?.parts?.find(p => p.inlineData)?.inlineData?.data;
                    
                    if (!outputBase64) throw new Error("Synthesis failed");

                    const outImg = new Image();
                    outImg.onload = () => {
                        originalOutput = outImg;
                        this.els.canvas.width = outImg.width;
                        this.els.canvas.height = outImg.height;
                        this.refreshCanvas();
                        this.renderFilterPreviews();
                        this.toggleLoading(false);
                        this.els.redoBtn.classList.remove('hidden'); // Show redo after success
                    };
                    outImg.src = `data:image/png;base64,${outputBase64}`;
                } catch (err) {
                    this.showToast("Engine Timeout.");
                    this.toggleLoading(false);
                }
            },

            refreshCanvas() {
                if (!originalOutput) return;
                const ctx = this.els.canvas.getContext("2d");
                const intensity = document.getElementById('intensity').value;
                ctx.clearRect(0, 0, this.els.canvas.width, this.els.canvas.height);
                FilterEngine[currentFilter](ctx, originalOutput, intensity);
            },

            renderFilterPreviews() {
                this.els.filterItems.innerHTML = '';
                Object.keys(FilterEngine).forEach(name => {
                    const item = document.createElement("div");
                    item.className = `filter-item ${name === currentFilter ? 'active' : ''}`;
                    
                    const canvas = document.createElement("canvas");
                    canvas.width = 120; canvas.height = 120;
                    FilterEngine[name](canvas.getContext("2d"), originalOutput, 70);
                    
                    const label = document.createElement("div");
                    label.className = "text-[9px] font-bold uppercase mt-1 text-gray-400 tracking-tighter whitespace-nowrap overflow-hidden text-ellipsis";
                    label.textContent = name;
                    
                    item.appendChild(canvas);
                    item.appendChild(label);
                    item.onclick = () => {
                        currentFilter = name;
                        document.querySelectorAll('.filter-item').forEach(el => el.classList.remove('active'));
                        item.classList.add('active');
                        this.refreshCanvas();
                    };
                    this.els.filterItems.appendChild(item);
                });
            },

            downloadArt() {
                const link = document.createElement('a');
                link.href = this.els.canvas.toDataURL('image/jpeg', 0.9);
                link.download = `animefy-${currentFilter.toLowerCase()}-${Date.now()}.jpg`;
                link.click();
            },

            showToast(msg) {
                this.els.toast.textContent = msg;
                this.els.toast.classList.remove('opacity-0');
                setTimeout(() => this.els.toast.classList.add('opacity-0'), 3000);
            }
        };

        UI.init();
    </script>
</body>
</html>
